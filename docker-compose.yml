name: flac-guard

services:
  nginx-rtmp:
    build: ./server/nginx-rtmp
    ports:
      - "1935:1935"   # RTMP ingest (câmeras)
      - "8080:8080"   # HLS playback + stats
    volumes:
      - hls_data:/data/hls
      - recordings:/data/recordings
    depends_on:
      - api
    restart: unless-stopped

  api:
    build: ./server/api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://flac_guard:flac_guard@db:5432/flac_guard
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - RTMP_HOST=nginx-rtmp
      - HLS_BASE_URL=http://nginx-rtmp:8080/hls
      - PORT=8000
      - PULSE_API_URL=${PULSE_API_URL:-https://happydopulse-production.up.railway.app/api}
      - PULSE_EMAIL=${PULSE_EMAIL:-}
      - PULSE_PASSWORD=${PULSE_PASSWORD:-}
      - FACE_SERVICE_URL=http://face-service:8001
    volumes:
      - recordings:/data/recordings
      - ./deploy-status.json:/app/deploy-status.json:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /:/host:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  face-service:
    build: ./server/face-service
    ports:
      - "8001:8001"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

  dashboard:
    build: ./dashboard
    ports:
      - "3000:3000"
    depends_on:
      - api
      - nginx-rtmp
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=flac_guard
      - POSTGRES_PASSWORD=flac_guard
      - POSTGRES_DB=flac_guard
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flac_guard -d flac_guard"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
    external: true
    name: flac-guard_pgdata
  hls_data:
    external: true
    name: flac-guard_hls_data
  recordings:
    external: true
    name: flac-guard_recordings
